<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add" />
    <script src="https://kit.fontawesome.com/edea0266da.js" crossorigin="anonymous"></script>
</head>
<body>
    <main class="planner">
        <header class="add-section">
            <input type="text" placeholder="Add your task here" class="add-task" id="task">
            <button type="submit" class="add" id="add-btn">
                <span class="material-symbols-outlined">add</span>
            </button>
        </header>

        <section class="task-section">
            <p class="none-txt" id="none-text">No tasks here.</p>
            <ul id="list" class="task-list">
            </ul>
        </section>

        <button class="clear" id="clear-btn">Clear All</button>
    </main>

    <script src="main.js"></script>
</body>
</html>
